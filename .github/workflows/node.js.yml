name: Node.js CI/CD - SuperWin Casino Backend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      # 1️⃣ Checkout the repo
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build backend (Webpack/Nitro/TS)
      - name: Build Project
        run: npx webpack --mode production

      # 5️⃣ Run tests
      - name: Run Tests
        run: npm test

      # 6️⃣ Build Docker image
      - name: Build Docker Image
        run: docker build -t superwincasino-backend:latest .

      # 7️⃣ Docker login
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8️⃣ Push Docker image
      - name: Push Docker Image
        run: |
          docker tag superwincasino-backend:latest ${{ secrets.DOCKER_USERNAME }}/superwincasino-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/superwincasino-backend:latest

      # 9️⃣ Deploy to VPS via SSH
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/superwincasino-backend:latest
            docker stop superwincasino-backend || true
            docker rm superwincasino-backend || true
            docker run -d \
              --name superwincasino-backend \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e BACK4APP_APP_ID=${{ secrets.BACK4APP_APP_ID }} \
              -e BACK4APP_JS_KEY=${{ secrets.BACK4APP_JS_KEY }} \
              -e CONVEX_URL=${{ secrets.CONVEX_URL }} \
              ${{ secrets.DOCKER_USERNAME }}/superwincasino-backend:latest
